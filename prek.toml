[[repos]]
repo = "builtin"
hooks = [
  { id = "check-merge-conflict" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" }
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.9"
hooks = [{ id = "ruff-check", args = ["--fix", "--show-fixes"] }, { id = "ruff-format" }]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.45.0"
hooks = [{ id = "typos" }]

[[repos]]
repo = "https://github.com/tombi-toml/tombi-pre-commit"
rev = "v0.9.13"
hooks = [{ id = "tombi-format", args = ["--offline"] }]
